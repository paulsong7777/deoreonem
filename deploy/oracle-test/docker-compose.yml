version: '3.8'

services:
  deoreonem-postgres:
    image: postgres:15-alpine
    container_name: deoreonem-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - deoreonem-pgdata:/var/lib/postgresql/data
    networks:
      - deoreonem-net
    # Not exposed publicly — only accessible within Docker network

  deoreonem-api:
    image: deoreonem-api:latest
    container_name: deoreonem-api
    restart: unless-stopped
    depends_on:
      - deoreonem-postgres
    environment:
      DB_HOST: deoreonem-postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASS: ${POSTGRES_PASSWORD}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-default}
    ports:
      - "8080:8080"
    networks:
      - deoreonem-net

volumes:
  deoreonem-pgdata:

networks:
  deoreonem-net:
    driver: bridge
