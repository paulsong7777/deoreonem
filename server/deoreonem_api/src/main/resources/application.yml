spring:
  application:
    name: deoreonem-api

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:deoreonem}
    username: ${DB_USER:deoreonem}
    password: ${DB_PASS:deoreonem}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-handlers-package: com.deoreonem.api.config
  configuration:
    map-underscore-to-camel-case: true
    default-fetch-size: 100
    default-statement-timeout: 30

server:
  port: 8080

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

---
spring:
  config:
    activate:
      on-profile: test

  datasource:
    url: jdbc:postgresql://${TEST_DB_HOST:localhost}:${TEST_DB_PORT:5432}/${TEST_DB_NAME:deoreonem_test}
    username: ${TEST_DB_USER:deoreonem}
    password: ${TEST_DB_PASS:deoreonem}

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
